<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chef Book Deluxe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>🍽 Chef Book</h1>
  <button id="addBtn">+ Add Recipe</button>
</header>

<main id="app">

  <div id="home">
    <div id="recipeList"></div>
  </div>

  <div id="addPage" class="hidden">
    <h2>Paste Recipe</h2>
    <textarea id="recipeInput" placeholder="Paste your recipe here..."></textarea>
    <button id="parseBtn">Auto Format</button>

    <div id="preview"></div>
    <button id="saveBtn">Save Recipe</button>
  </div>

  <div id="viewPage" class="hidden">
    <button id="backBtn">← Back</button>
    <div id="recipeView"></div>
  </div>

</main>

<script src="app.js"></script>
</body>
</html>
